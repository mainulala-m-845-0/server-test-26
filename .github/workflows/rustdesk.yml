name: Premium RustDesk Windows 2022

on:
  workflow_dispatch:

jobs:
  rustdesk:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:

      # =========================================================
      # STEP 1 — OPTIMIZE WINDOWS
      # =========================================================
      - name: Optimize Windows
        shell: powershell
        run: |
          Write-Host "===================================="
          Write-Host " PREMIUM RUSTDESK WINDOWS 2022"
          Write-Host "===================================="

          powercfg /setactive SCHEME_MIN

          powercfg /change standby-timeout-ac 0
          powercfg /change monitor-timeout-ac 0
          powercfg /change hibernate-timeout-ac 0

          Stop-Service wuauserv -Force -ErrorAction SilentlyContinue
          Set-Service wuauserv -StartupType Disabled -ErrorAction SilentlyContinue

          Write-Host "[OK] Windows optimized"

      # =========================================================
      # STEP 2 — START EXPLORER DESKTOP
      # =========================================================
      - name: Start Explorer Desktop
        shell: powershell
        run: |
          cmd /c start explorer.exe

          Start-Sleep -Seconds 10

          Write-Host "[OK] Explorer desktop started"

      # =========================================================
      # STEP 3 — DOWNLOAD RUSTDESK
      # =========================================================
      - name: Download RustDesk
        shell: powershell
        run: |
          $url = "https://github.com/rustdesk/rustdesk/releases/latest/download/rustdesk-1.4.7-x86_64.exe"

          $out = Join-Path $env:TEMP "rustdesk.exe"

          Invoke-WebRequest `
            -Uri $url `
            -OutFile $out `
            -UseBasicParsing

          if (Test-Path $out) {

            Write-Host "[OK] RustDesk downloaded"

          } else {

            Write-Host "[ERROR] RustDesk download failed"
            exit 1
          }

      # =========================================================
      # STEP 4 — START RUSTDESK
      # =========================================================
      - name: Launch RustDesk
        shell: powershell
        run: |
          $rustdesk = Join-Path $env:TEMP "rustdesk.exe"

          Start-Process `
            -FilePath $rustdesk

          Start-Sleep -Seconds 40

          $proc = Get-Process rustdesk -ErrorAction SilentlyContinue

          if ($proc) {

            Write-Host "[OK] RustDesk started"

          } else {

            Write-Host "[ERROR] RustDesk failed"
            exit 1
          }

      # =========================================================
      # STEP 5 — SHOW RUSTDESK ID
      # =========================================================
      - name: Show RustDesk Information
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "===================================="
          Write-Host " RUSTDESK INFORMATION"
          Write-Host "===================================="
          Write-Host ""

          $configPaths = @(
            "$env:APPDATA\RustDesk\config\RustDesk.toml",
            "$env:USERPROFILE\AppData\Roaming\RustDesk\config\RustDesk.toml",
            "$env:APPDATA\RustDesk\config\RustDesk2.toml"
          )

          $found = $false

          foreach ($path in $configPaths) {

            if (Test-Path $path) {

              Write-Host "[OK] Config Found:"
              Write-Host $path
              Write-Host ""

              Get-Content $path

              $found = $true

              break
            }
          }

          if (-not $found) {

            Write-Host "[WARN] RustDesk config not generated yet"
            Write-Host ""
            Write-Host "RustDesk processes running:"
            Write-Host ""

            Get-Process rustdesk -ErrorAction SilentlyContinue

            Write-Host ""
            Write-Host "Open runner desktop manually if needed."
          }

      # =========================================================
      # STEP 6 — KEEP RUNNER ALIVE
      # =========================================================
      - name: Keep Alive
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "===================================="
          Write-Host " KEEP ALIVE ACTIVE"
          Write-Host "===================================="

          $rustdeskExe = Join-Path $env:TEMP "rustdesk.exe"

          while ($true) {

            $time = Get-Date -Format "HH:mm:ss"

            $proc = Get-Process rustdesk -ErrorAction SilentlyContinue

            if ($proc) {

              Write-Host "[$time] RustDesk Running"

            } else {

              Write-Host "[$time] RustDesk stopped — restarting"

              Start-Process `
                -FilePath $rustdeskExe

              Start-Sleep -Seconds 15
            }

            Start-Sleep -Seconds 60
          }
