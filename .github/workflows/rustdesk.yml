name: Premium RustDesk Windows 2022

on:
  workflow_dispatch:

jobs:
  rustdesk:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:

      # =========================================================
      # STEP 1 — SYSTEM OPTIMIZATION
      # =========================================================
      - name: Optimize Windows
        shell: powershell
        run: |
          Write-Host "===================================="
          Write-Host " PREMIUM RUSTDESK WINDOWS"
          Write-Host "===================================="

          powercfg /setactive SCHEME_MIN

          powercfg /change standby-timeout-ac 0
          powercfg /change monitor-timeout-ac 0
          powercfg /change hibernate-timeout-ac 0

          Stop-Service wuauserv -Force -ErrorAction SilentlyContinue
          Set-Service wuauserv -StartupType Disabled -ErrorAction SilentlyContinue

          Write-Host "[OK] Windows optimized"

      # =========================================================
      # STEP 2 — DOWNLOAD RUSTDESK
      # =========================================================
      - name: Download RustDesk
        shell: powershell
        run: |
          $url = "https://github.com/rustdesk/rustdesk/releases/latest/download/rustdesk-1.4.7-x86_64.exe"
          $out = "$env:TEMP\rustdesk.exe"

          Invoke-WebRequest `
            -Uri $url `
            -OutFile $out `
            -UseBasicParsing

          if (Test-Path $out) {
            Write-Host "[OK] RustDesk downloaded"
          } else {
            Write-Host "[ERROR] Download failed"
            exit 1
          }

      # =========================================================
      # STEP 3 — START INTERACTIVE DESKTOP
      # =========================================================
      - name: Start Explorer Desktop
        shell: powershell
        run: |
          cmd /c start explorer.exe

          Start-Sleep -Seconds 10

          Write-Host "[OK] Explorer desktop started"

      # =========================================================
      # STEP 4 — START RUSTDESK
      # =========================================================
      - name: Launch RustDesk
        shell: powershell
        run: |
          $rustdesk = "$env:TEMP\rustdesk.exe"

          Start-Process `
            -FilePath $rustdesk `
            -ArgumentList "--silent-install" `
            -Verb RunAs

          Start-Sleep -Seconds 25

          $proc = Get-Process | Where-Object {
            $_.ProcessName -match "rustdesk"
          }

          if ($proc) {
            Write-Host "[OK] RustDesk started"
          } else {
            Write-Host "[ERROR] RustDesk not running"
            exit 1
          }

      # =========================================================
      # STEP 5 — GET RUSTDESK ID
      # =========================================================
      - name: Get RustDesk ID
        shell: powershell
        run: |
          $possible = @(
            "$env:APPDATA\RustDesk\config\RustDesk.toml",
            "$env:APPDATA\RustDesk\config\RustDesk2.toml",
            "$env:USERPROFILE\AppData\Roaming\RustDesk\config\RustDesk.toml"
          )

          $config = $null

          foreach ($p in $possible) {
            if (Test-Path $p) {
              $config = $p
              break
            }
          }

          if (-not $config) {

            Write-Host ""
            Write-Host "[WARN] Config not found yet"
            Write-Host ""
            Write-Host "Open RustDesk window manually from runner desktop"
            Write-Host "ID will appear there"
            Write-Host ""

            Get-Process rustdesk

            exit 0
          }

          Write-Host ""
          Write-Host "===================================="
          Write-Host " RUSTDESK INFORMATION"
          Write-Host "===================================="
          Write-Host ""

          Get-Content $config

          Write-Host ""
          Write-Host "===================================="

      # =========================================================
      # STEP 6 — KEEP RUNNER ALIVE
      # =========================================================
      - name: Keep Alive
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "===================================="
          Write-Host " KEEP ALIVE ACTIVE"
          Write-Host "===================================="

          while ($true) {

            $time = Get-Date -Format "HH:mm:ss"

            $proc = Get-Process rustdesk -ErrorAction SilentlyContinue

            if ($proc) {
              Write-Host "[$time] RustDesk Running"
            } else {
              Write-Host "[$time] RustDesk Stopped — Restarting"

              Start-Process "$env:TEMP\rustdesk.exe"

              Start-Sleep -Seconds 10
            }

            Start-Sleep -Seconds 60
          }
