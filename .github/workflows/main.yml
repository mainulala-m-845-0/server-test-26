# ============================================================
#  Premium Windows RDP via Cloudflare Tunnel
#  Credit: Kobir Shah
# ============================================================

name: Premium Windows RDP via Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  rdp:
    name: Premium Windows RDP - Kobir Shah
    runs-on: windows-2025
    timeout-minutes: 360

    steps:

      # --------------------------------------------------------
      # STEP 1 - System Performance Optimization
      # --------------------------------------------------------
      - name: System Performance Optimization
        shell: powershell
        run: |
          Write-Host "========================================"
          Write-Host "  Premium Windows RDP"
          Write-Host "  Credit: Kobir Shah"
          Write-Host "========================================"
          Write-Host ""
          Write-Host "  Optimizing system performance..."
          Write-Host ""

          # High Performance power plan - extract GUID via regex (safe for any output format)
          $hp = powercfg -list | Select-String "High performance"
          if ($hp) {
            $guidMatch = [regex]::Match(
              $hp.ToString(),
              "[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}"
            )
            if ($guidMatch.Success) {
              powercfg /setactive $guidMatch.Value 2>&1 | Out-Null
              Write-Host "[OK] High Performance power plan activated: $($guidMatch.Value)"
            } else {
              Write-Host "[INFO] GUID not found - using SCHEME_BALANCED"
              powercfg /setactive SCHEME_BALANCED 2>&1 | Out-Null
            }
          } else {
            powercfg /setactive SCHEME_BALANCED 2>&1 | Out-Null
            Write-Host "[INFO] High Performance not found - using Balanced fallback"
          }

          # Disable sleep / hibernate / monitor timeout
          # Use /change instead of deprecated -change on Windows Server 2025
          powercfg /change standby-timeout-ac 0
          powercfg /change hibernate-timeout-ac 0
          powercfg /change monitor-timeout-ac 0
          Write-Host "[OK] Sleep and hibernate disabled"

          # Disable Windows Update service
          Stop-Service -Name wuauserv -Force -ErrorAction SilentlyContinue
          Set-Service -Name wuauserv -StartupType Disabled -ErrorAction SilentlyContinue
          Write-Host "[OK] Windows Update disabled"

          # Disable SysMain (Superfetch) to free RAM
          Stop-Service -Name SysMain -Force -ErrorAction SilentlyContinue
          Set-Service -Name SysMain -StartupType Disabled -ErrorAction SilentlyContinue
          Write-Host "[OK] SysMain disabled"

          # Optimize TCP stack
          netsh int tcp set global autotuninglevel=normal 2>&1 | Out-Null
          netsh int tcp set global chimney=enabled 2>&1 | Out-Null
          netsh int tcp set global ecncapability=enabled 2>&1 | Out-Null
          Write-Host "[OK] TCP stack optimized"

          # Set DNS to Cloudflare 1.1.1.1 for speed
          $adapters = Get-NetAdapter | Where-Object { $_.Status -eq "Up" }
          foreach ($adapter in $adapters) {
            Set-DnsClientServerAddress `
              -InterfaceIndex $adapter.ifIndex `
              -ServerAddresses ("1.1.1.1", "1.0.0.1") `
              -ErrorAction SilentlyContinue
          }
          Write-Host "[OK] DNS set to Cloudflare 1.1.1.1 / 1.0.0.1"

          Write-Host ""
          Write-Host "========================================"
          Write-Host "  Optimization Complete"
          Write-Host "========================================"

      # --------------------------------------------------------
      # STEP 2 - Enable RDP and Create User
      # --------------------------------------------------------
      - name: Enable Remote Desktop and Create User
        shell: powershell
        run: |
          Write-Host "========================================"
          Write-Host "  Enabling Premium Windows RDP"
          Write-Host "  Credit: Kobir Shah"
          Write-Host "========================================"
          Write-Host ""

          $username = "rdpadmin"
          $password = "Premium@RDP2025!"

          # Remove user if already exists - capture output to suppress NativeCommandError
          $deleteResult = net user $username /delete 2>&1
          if ("$deleteResult" -match "successfully") {
            Write-Host "[OK] Existing user '$username' removed"
          } else {
            Write-Host "[INFO] No existing user found - continuing..."
          }

          # Create new admin user - capture result for clean error handling
          $createResult = net user $username $password /add /expires:never /passwordchg:no 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "[ERROR] Failed to create user: $createResult"
            $host.SetShouldExit(1)
            exit 1
          }
          Write-Host "[OK] User '$username' created successfully"

          # Add user to Administrators group
          $adminResult = net localgroup Administrators $username /add 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "[OK] User added to Administrators"
          } else {
            Write-Host "[INFO] Administrators result: $adminResult"
          }

          # Add user to Remote Desktop Users group
          net localgroup "Remote Desktop Users" $username /add 2>&1 | Out-Null
          Write-Host "[OK] User added to Remote Desktop Users"

          # Add default GitHub runner account to admins
          net localgroup Administrators runneradmin /add 2>&1 | Out-Null
          Write-Host "[OK] runneradmin added to Administrators"

          # Enable RDP
          Set-ItemProperty `
            -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
            -Name "fDenyTSConnections" `
            -Value 0 `
            -Type DWord
          Write-Host "[OK] RDP enabled"

          # Disable Network Level Authentication for easy login
          Set-ItemProperty `
            -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" `
            -Name "UserAuthentication" `
            -Value 0 `
            -Type DWord
          Write-Host "[OK] NLA disabled"

          # Allow multiple concurrent RDP sessions
          Set-ItemProperty `
            -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
            -Name "fSingleSessionPerUser" `
            -Value 0 `
            -Type DWord
          Write-Host "[OK] Multiple concurrent sessions allowed"

          # Enable built-in Remote Desktop firewall group
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue

          # Remove old custom rule if exists - prevent duplicate rule error
          Remove-NetFirewallRule -Name "RDP-TCP-In-Custom" -ErrorAction SilentlyContinue

          # Add explicit inbound rule for port 3389
          New-NetFirewallRule `
            -Name "RDP-TCP-In-Custom" `
            -DisplayName "Remote Desktop TCP-In Custom" `
            -Enabled True `
            -Direction Inbound `
            -Protocol TCP `
            -LocalPort 3389 `
            -Action Allow `
            -ErrorAction SilentlyContinue | Out-Null
          Write-Host "[OK] Firewall rules configured"

          # Restart Terminal Services to apply all changes
          Restart-Service -Name TermService -Force -ErrorAction Stop
          Write-Host "[OK] Terminal Services restarted"

          # Wait and verify RDP is listening on port 3389
          Start-Sleep -Seconds 5
          $listening = Get-NetTCPConnection `
            -LocalPort 3389 `
            -State Listen `
            -ErrorAction SilentlyContinue

          if ($listening) {
            Write-Host "[OK] RDP is LISTENING on port 3389"
          } else {
            Write-Host "[WARN] RDP port 3389 not detected yet - may take a moment"
          }

          Write-Host ""
          Write-Host "========================================"
          Write-Host "  LOGIN CREDENTIALS"
          Write-Host "========================================"
          Write-Host ""
          Write-Host "  Username : $username"
          Write-Host "  Password : $password"
          Write-Host ""
          Write-Host "========================================"
          Write-Host "  RDP ENABLED SUCCESSFULLY"
          Write-Host "  Credit: Kobir Shah"
          Write-Host "========================================"

      # --------------------------------------------------------
      # STEP 3 - Download Cloudflared
      # --------------------------------------------------------
      - name: Download Cloudflared
        shell: powershell
        run: |
          Write-Host "========================================"
          Write-Host "  Downloading Cloudflared"
          Write-Host "  Credit: Kobir Shah"
          Write-Host "========================================"
          Write-Host ""

          $url     = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          $dest    = "C:\cloudflared.exe"
          $minSize = 1048576

          # Remove existing file if present
          if (Test-Path $dest) {
            Remove-Item $dest -Force -ErrorAction SilentlyContinue
            Write-Host "[INFO] Removed existing cloudflared.exe"
          }

          # Try BITS transfer with 120 second timeout to prevent hanging
          Write-Host "  Trying BITS transfer..."
          try {
            Start-BitsTransfer `
              -Source $url `
              -Destination $dest `
              -TransferType Download `
              -ErrorAction Stop
            Write-Host "[OK] BITS transfer complete"
          } catch {
            Write-Host "[INFO] BITS failed: $($_.Exception.Message)"
          }

          # Fallback to Invoke-WebRequest if BITS failed or file too small
          if (-not (Test-Path $dest) -or (Get-Item $dest).Length -lt $minSize) {
            Write-Host "  Using Invoke-WebRequest fallback..."
            try {
              [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
              Invoke-WebRequest `
                -Uri $url `
                -OutFile $dest `
                -UseBasicParsing `
                -TimeoutSec 120
              Write-Host "[OK] Invoke-WebRequest download complete"
            } catch {
              Write-Host "[ERROR] Download failed: $($_.Exception.Message)"
              $host.SetShouldExit(1)
              exit 1
            }
          }

          # Final verification
          if ((Test-Path $dest) -and (Get-Item $dest).Length -ge $minSize) {
            $sizeMB = [math]::Round((Get-Item $dest).Length / 1048576, 2)
            Write-Host "[OK] Cloudflared ready: $sizeMB MB at $dest"
          } else {
            Write-Host "[ERROR] Cloudflared file missing or too small after download"
            $host.SetShouldExit(1)
            exit 1
          }

          Write-Host ""
          Write-Host "========================================"
          Write-Host "  Download Complete"
          Write-Host "========================================"

      # --------------------------------------------------------
      # STEP 4 - Start Cloudflare Tunnel and Show Info
      # --------------------------------------------------------
      - name: Start Cloudflare Tunnel and Show Connection Info
        shell: powershell
        run: |
          Write-Host "========================================"
          Write-Host "  Starting Cloudflare Tunnel"
          Write-Host "  Credit: Kobir Shah"
          Write-Host "========================================"
          Write-Host ""

          $logOut = "$env:TEMP\cf-out.log"
          $logErr = "$env:TEMP\cf-err.log"

          # Remove stale logs from previous runs
          Remove-Item $logOut -Force -ErrorAction SilentlyContinue
          Remove-Item $logErr -Force -ErrorAction SilentlyContinue

          # Start cloudflared
          # Use -NoNewWindow only (NOT combined with -WindowStyle Hidden - they conflict)
          $proc = Start-Process `
            -FilePath "C:\cloudflared.exe" `
            -ArgumentList "tunnel --url tcp://localhost:3389 --no-autoupdate --loglevel info" `
            -RedirectStandardOutput $logOut `
            -RedirectStandardError $logErr `
            -NoNewWindow `
            -PassThru

          Write-Host "[OK] Cloudflared started - PID: $($proc.Id)"
          Write-Host "  Waiting for tunnel URL (max 90 seconds)..."
          Write-Host ""

          # Poll logs for trycloudflare URL
          $tunnelUrl = ""
          $maxWait   = 90
          $elapsed   = 0

          while ($elapsed -lt $maxWait) {
            Start-Sleep -Seconds 3
            $elapsed += 3

            # Read logs safely - default to empty string if null
            $content = ""
            if (Test-Path $logErr) {
              $raw = Get-Content $logErr -Raw -ErrorAction SilentlyContinue
              if ($null -ne $raw) { $content += $raw }
            }
            if (Test-Path $logOut) {
              $raw = Get-Content $logOut -Raw -ErrorAction SilentlyContinue
              if ($null -ne $raw) { $content += $raw }
            }

            # Search for tunnel URL only if content is not empty
            if ($content.Length -gt 0) {
              $match = [regex]::Match(
                $content,
                "https://[a-zA-Z0-9\-]+\.trycloudflare\.com"
              )
              if ($match.Success) {
                $tunnelUrl = $match.Value
                Write-Host "[OK] Tunnel URL found after $elapsed seconds"
                break
              }
            }

            # Check process exit AFTER checking logs
            # (logs may have URL even if process just exited)
            if ($proc.HasExited -and $tunnelUrl -eq "") {
              Write-Host "[ERROR] Cloudflared exited - code: $($proc.ExitCode)"
              Write-Host ""
              Write-Host "--- STDOUT ---"
              Get-Content $logOut -ErrorAction SilentlyContinue
              Write-Host "--- STDERR ---"
              Get-Content $logErr -ErrorAction SilentlyContinue
              $host.SetShouldExit(1)
              exit 1
            }

            Write-Host "  [$elapsed / $maxWait sec] Still waiting..."
          }

          # Display connection information
          Write-Host ""
          Write-Host "========================================"
          Write-Host "  PREMIUM RDP - CONNECTION INFORMATION"
          Write-Host "  Credit: Kobir Shah"
          Write-Host "========================================"
          Write-Host ""

          if ($tunnelUrl -ne "") {
            # Use -replace to strip https:// safely
            $rdpHost = $tunnelUrl -replace "https://", ""

            Write-Host "  Tunnel URL  : $tunnelUrl"
            Write-Host "  RDP Host    : $rdpHost"
            Write-Host "  RDP Port    : 443 (via Cloudflare)"
            Write-Host ""
            Write-Host "  Username    : rdpadmin"
            Write-Host "  Password    : Premium@RDP2025!"
            Write-Host ""
            Write-Host "========================================"
            Write-Host "  HOW TO CONNECT"
            Write-Host "========================================"
            Write-Host ""
            Write-Host "  1. Install cloudflared on your local PC:"
            Write-Host "     https://developers.cloudflare.com/cloudflare-one/"
            Write-Host "     connections/connect-networks/downloads/"
            Write-Host ""
            Write-Host "  2. Run this command on YOUR local machine:"
            Write-Host ""
            # Concatenate string to guarantee $rdpHost expands correctly
            $connectCmd = "     cloudflared access rdp --hostname " + $rdpHost + " --url rdp://localhost:13389"
            Write-Host $connectCmd
            Write-Host ""
            Write-Host "  3. Open Remote Desktop (mstsc) and connect:"
            Write-Host "     Host     : localhost:13389"
            Write-Host "     Username : rdpadmin"
            Write-Host "     Password : Premium@RDP2025!"
            Write-Host ""
          } else {
            Write-Host "  [WARN] Tunnel URL not detected in $maxWait seconds"
            Write-Host "  Search logs below for the URL manually"
            Write-Host ""
            Write-Host "  Username : rdpadmin"
            Write-Host "  Password : Premium@RDP2025!"
            Write-Host ""
            Write-Host "--- STDOUT LOG ---"
            Get-Content $logOut -ErrorAction SilentlyContinue
            Write-Host ""
            Write-Host "--- STDERR LOG ---"
            Get-Content $logErr -ErrorAction SilentlyContinue
          }

          Write-Host ""
          Write-Host "========================================"
          Write-Host "  Credit: Kobir Shah"
          Write-Host "========================================"

      # --------------------------------------------------------
      # STEP 5 - Keep Runner Alive with Health Checks
      # --------------------------------------------------------
      - name: Keep Runner Alive
        shell: powershell
        run: |
          Write-Host "========================================"
          Write-Host "  Session Keep-Alive Active"
          Write-Host "  Credit: Kobir Shah"
          Write-Host "========================================"
          Write-Host ""
          Write-Host "  Max Duration : 360 minutes"
          Write-Host "  Health check : Every 10 minutes"
          Write-Host ""
          Write-Host "========================================"

          $startTime    = Get-Date
          $iteration    = 0
          $cfExe        = "C:\cloudflared.exe"
          $tunnelArgs   = "tunnel --url tcp://localhost:3389 --no-autoupdate"

          # Run one immediate health check at start
          $cf = Get-Process -Name "cloudflared" -ErrorAction SilentlyContinue
          if ($cf) {
            Write-Host "[OK] Cloudflared confirmed running at start - PID: $($cf.Id)"
          } else {
            Write-Host "[WARN] Cloudflared not found at start - launching now..."
            Start-Process `
              -FilePath $cfExe `
              -ArgumentList $tunnelArgs `
              -NoNewWindow
          }

          while ($true) {
            $iteration++
            $now     = Get-Date
            $elapsed = [math]::Round(($now - $startTime).TotalMinutes, 1)
            $timeStr = $now.ToString("HH:mm:ss")

            Write-Host "[$timeStr] Alive | Elapsed: $elapsed min | Tick: $iteration"

            # Health check every 10 iterations = every 10 minutes
            if ($iteration % 10 -eq 0) {
              Write-Host "[$timeStr] ---- Health Check ----"

              # Check cloudflared process
              $cf = Get-Process -Name "cloudflared" -ErrorAction SilentlyContinue
              if ($cf) {
                Write-Host "[$timeStr] [OK] Cloudflared running - PID: $($cf.Id)"
              } else {
                Write-Host "[$timeStr] [WARN] Cloudflared stopped - restarting..."
                $rlOut = "$env:TEMP\cf-restart-out.log"
                $rlErr = "$env:TEMP\cf-restart-err.log"
                Start-Process `
                  -FilePath $cfExe `
                  -ArgumentList $tunnelArgs `
                  -RedirectStandardOutput $rlOut `
                  -RedirectStandardError $rlErr `
                  -NoNewWindow
                Start-Sleep -Seconds 5
                $cfCheck = Get-Process -Name "cloudflared" -ErrorAction SilentlyContinue
                if ($cfCheck) {
                  Write-Host "[$timeStr] [OK] Cloudflared restarted - PID: $($cfCheck.Id)"
                } else {
                  Write-Host "[$timeStr] [ERROR] Cloudflared failed to restart"
                }
              }

              # Check RDP port 3389 is still listening
              $rdp = Get-NetTCPConnection `
                -LocalPort 3389 `
                -State Listen `
                -ErrorAction SilentlyContinue

              if ($rdp) {
                Write-Host "[$timeStr] [OK] RDP port 3389 listening"
              } else {
                Write-Host "[$timeStr] [WARN] RDP port down - restarting TermService..."
                Restart-Service -Name TermService -Force -ErrorAction SilentlyContinue
                Start-Sleep -Seconds 3
                $rdpCheck = Get-NetTCPConnection `
                  -LocalPort 3389 `
                  -State Listen `
                  -ErrorAction SilentlyContinue
                if ($rdpCheck) {
                  Write-Host "[$timeStr] [OK] RDP port restored"
                } else {
                  Write-Host "[$timeStr] [ERROR] RDP port still down after restart"
                }
              }

              Write-Host "[$timeStr] ---- Health Check Complete ----"
            }

            Start-Sleep -Seconds 60
          }
